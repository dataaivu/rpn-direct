name: Build Core (ICE engine)

on:
  push:
    paths:
      - 'core/**'
      - '.github/workflows/core.yml'
  workflow_dispatch:

# Build/verify only — never deploys. Safe to run on feature branches.
jobs:
  vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Resolve modules
        run: go mod tidy

      - name: Vet (compile-check the whole engine)
        run: go vet ./...

      - name: Commit tidied go.mod/go.sum back
        if: always()
        run: |
          git config user.name  "ci-bot"
          git config user.email "ci@dataaivu"
          git add go.mod go.sum 2>/dev/null || true
          git diff --cached --quiet || echo "(go.mod/go.sum changed — tidy locally)"

  gomobile:
    runs-on: ubuntu-latest
    needs: vet
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;26.1.10909125" > /dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gomobile init
        run: gomobile init

      - name: Add gomobile bind dep
        run: go get golang.org/x/mobile/bind

      - name: Build .aar
        run: gomobile bind -target=android/arm64,android/arm -o rpncore.aar ./mobile

      - name: Upload .aar
        uses: actions/upload-artifact@v4
        with:
          name: rpncore-aar
          path: core/rpncore.aar
          if-no-files-found: error
