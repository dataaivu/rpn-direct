name: Build Core (ICE engine)

on:
  push:
    paths:
      - 'core/**'
      - 'coordinator/**'
      - '.github/workflows/core.yml'
  workflow_dispatch:

# Build/verify only — never deploys. Safe to run on feature branches.
jobs:
  vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Resolve modules
        run: go mod tidy

      - name: Vet (compile-check the whole engine)
        run: go vet ./...

      - name: Build rpn-exit (Pi ARMv7)
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: 7
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o rpn-exit ./cmd/rpn-exit

      - name: Upload rpn-exit
        uses: actions/upload-artifact@v4
        with:
          name: rpn-exit-linux-arm7
          path: core/rpn-exit
          if-no-files-found: error

  coordinator-vet:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coordinator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod tidy
      - name: Vet coordinator (offer/answer changes)
        run: go vet ./...

  gomobile:
    runs-on: ubuntu-latest
    needs: vet
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;26.1.10909125" > /dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

      # Pin x/mobile to a Go-1.22-compatible revision. The @latest revision
      # requires Go 1.25, and Go 1.23+ enforces the //go:linkname ban that breaks
      # github.com/wlynxg/anet's reference to net.zoneCache during gomobile bind.
      - name: Install gomobile (pinned)
        env:
          XMOBILE: v0.0.0-20240716161057-1ad2df20a8b6
        run: |
          go install golang.org/x/mobile/cmd/gomobile@$XMOBILE
          go install golang.org/x/mobile/cmd/gobind@$XMOBILE
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gomobile init
        run: gomobile init

      - name: Pin x/mobile in the module (prevents the Go 1.25 upgrade)
        run: go get golang.org/x/mobile@v0.0.0-20240716161057-1ad2df20a8b6

      - name: Build .aar
        # -androidapi 21 matches the app's minSdk; NDK 26 supports only 21..34.
        run: gomobile bind -androidapi 21 -target=android/arm64,android/arm -o rpncore.aar ./mobile

      - name: Upload .aar
        uses: actions/upload-artifact@v4
        with:
          name: rpncore-aar
          path: core/rpncore.aar
          if-no-files-found: error
