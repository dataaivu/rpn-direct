name: Build & Deploy Coordinator

on:
  push:
    branches: [master, main]
    paths:
      - 'coordinator/**'
      - '.github/workflows/coordinator.yml'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coordinator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Resolve modules
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Build linux/amd64 binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o rpn-coord ./...

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpn-coord-linux-amd64
          path: coordinator/rpn-coord
          if-no-files-found: error

      - name: Deploy to VPS
        env:
          VPS_KEY:      ${{ secrets.VPS_SSH_KEY }}
          TURN_SECRET:  ${{ secrets.RPN_TURN_SECRET }}
          FLEET_TOKEN:  ${{ secrets.RPN_FLEET_TOKEN }}
          ADMIN_TOKEN:  ${{ secrets.RPN_ADMIN_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 65.20.80.3 >> ~/.ssh/known_hosts

          scp -i ~/.ssh/id_ed25519 rpn-coord root@65.20.80.3:/opt/rpn-coord/rpn-coord.new
          scp -i ~/.ssh/id_ed25519 rpn-coord.service root@65.20.80.3:/etc/systemd/system/rpn-coord.service

          ssh -i ~/.ssh/id_ed25519 root@65.20.80.3 "
            mv /opt/rpn-coord/rpn-coord.new /opt/rpn-coord/rpn-coord
            chmod +x /opt/rpn-coord/rpn-coord

            # Write secrets env file (chmod 600 — root only)
            cat > /opt/rpn-coord/env << 'ENVEOF'
TURN_SECRET=$TURN_SECRET
FLEET_TOKEN=$FLEET_TOKEN
ADMIN_TOKEN=$ADMIN_TOKEN
ENVEOF
            chmod 600 /opt/rpn-coord/env

            # Open ports (idempotent)
            ufw allow 8089/tcp comment 'rpn-coord WSS+REST' 2>/dev/null || true
            ufw allow 3479/udp comment 'rpn-coord STUN'     2>/dev/null || true
            ufw allow 3481/udp comment 'rpn-coord STUN2'    2>/dev/null || true
            ufw allow 3480/udp comment 'rpn-coord TURN'     2>/dev/null || true

            systemctl daemon-reload
            systemctl enable rpn-coord
            systemctl restart rpn-coord
            sleep 2
            systemctl is-active rpn-coord
            curl -sf http://localhost:8089/healthz
          "
